esphome:
  name: sunton-28-sonos-panel
  friendly_name: Sunton Sonos Panel

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Sunton Fallback"
    password: !secret fallback_password

captive_portal:

spi:
  - id: tft_spi
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12

  - id: touch_spi
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39


output:
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm


light:
  - platform: monochromatic
    id: display_backlight
    name: Display Backlight
    output: backlight_pwm
    restore_mode: ALWAYS_ON


font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 16

  - file: "gfonts://Roboto"
    id: font_medium
    size: 22

  - file: "gfonts://Roboto"
    id: font_large
    size: 30


text_sensor:
  - platform: homeassistant
    id: sonos_title
    entity_id: media_player.arc
    attribute: media_title
    internal: true

  - platform: homeassistant
    id: sonos_artist
    entity_id: media_player.arc
    attribute: media_artist
    internal: true

  - platform: homeassistant
    id: sonos_state
    entity_id: media_player.arc
    internal: true


display:
  - platform: mipi_spi
    id: main_display
    model: ILI9341
    spi_id: tft_spi
    cs_pin: GPIO15
    dc_pin: GPIO2
    reset_pin: GPIO4
    dimensions:
      width: 240
      height: 320
    rotation: 90
    update_interval: 1s

    lambda: |-
      it.fill(Color(0,0,0));

      it.printf(10,10,id(font_medium),Color(255,255,255),"Sonos Arc");

      if(id(sonos_title).has_state())
        it.printf(10,70,id(font_large),Color(255,255,255),"%s",id(sonos_title).state.c_str());

      if(id(sonos_artist).has_state())
        it.printf(10,110,id(font_medium),Color(0,255,0),"%s",id(sonos_artist).state.c_str());

      if(id(sonos_state).has_state())
        it.printf(10,40,id(font_small),Color(0,180,255),"State: %s",id(sonos_state).state.c_str());

      it.rectangle(10,200,60,40,Color(255,255,255));
      it.rectangle(90,200,60,40,Color(255,255,255));
      it.rectangle(170,200,60,40,Color(255,255,255));

      it.printf(40,220,id(font_small),Color(255,255,255),TextAlign::CENTER,"VOL-");
      it.printf(120,220,id(font_small),Color(255,255,255),TextAlign::CENTER,"PAUSE");
      it.printf(200,220,id(font_small),Color(255,255,255),TextAlign::CENTER,"VOL+");


touchscreen:
  - platform: xpt2046
    id: main_touch
    spi_id: touch_spi
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    threshold: 400

    calibration:
      x_min: 280
      x_max: 3860
      y_min: 340
      y_max: 3860

    transform:
      swap_xy: true


binary_sensor:
  - platform: touchscreen
    name: Sonos Volume Down
    x_min: 0
    x_max: 80
    y_min: 200
    y_max: 260
    on_press:
      then:
        - homeassistant.action:
            action: media_player.volume_down
            data:
              entity_id: media_player.arc


  - platform: touchscreen
    name: Sonos Pause
    x_min: 81
    x_max: 160
    y_min: 200
    y_max: 260
    on_press:
      then:
        - homeassistant.action:
            action: media_player.media_pause
            data:
              entity_id: media_player.arc


  - platform: touchscreen
    name: Sonos Volume Up
    x_min: 161
    x_max: 240
    y_min: 200
    y_max: 260
    on_press:
      then:
        - homeassistant.action:
            action: media_player.volume_up
            data:
              entity_id: media_player.arc
