esphome:
  name: sunton-28-sonos-panel
  friendly_name: Sunton Sonos Panel

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Sunton Fallback"
    password: !secret fallback_password

captive_portal:

spi:
  - id: touch_spi
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

output:
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm

light:
  - platform: monochromatic
    id: display_backlight
    name: "Display Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 16

  - file: "gfonts://Roboto"
    id: font_medium
    size: 22

  - file: "gfonts://Roboto"
    id: font_large
    size: 28

display:
  - platform: mipi_spi
    id: main_display
    model: ESP32-2432S028
    auto_clear_enabled: false
    update_interval: never

touchscreen:
  - platform: xpt2046
    id: main_touch
    spi_id: touch_spi
    display: main_display
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    threshold: 400
    calibration:
      x_min: 280
      x_max: 3860
      y_min: 340
      y_max: 3860
    transform:
      swap_xy: true

text_sensor:
  - platform: homeassistant
    id: sonos_title
    entity_id: media_player.arc
    attribute: media_title
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: title_label
            text: !lambda |-
              std::string s = x;
              if (s.empty()) return std::string("No title");
              if (s.size() > 24) s = s.substr(0, 24) + "...";
              return s;

  - platform: homeassistant
    id: sonos_artist
    entity_id: media_player.arc
    attribute: media_artist
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: artist_label
            text: !lambda |-
              std::string s = x;
              if (s.empty()) return std::string("No artist");
              if (s.size() > 24) s = s.substr(0, 24) + "...";
              return s;

  - platform: homeassistant
    id: sonos_state
    entity_id: media_player.arc
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: state_label
            text: !lambda |-
              return std::string("State: ") + x;

lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touch

  theme:
    label:
      text_color: 0xFFFFFF
      bg_opa: TRANSP

  pages:
    - id: main_page
      bg_color: 0x000000
      widgets:
        - label:
            id: header_label
            x: 10
            y: 8
            text_font: font_medium
            text: "Sonos Arc"

        - label:
            id: state_label
            x: 10
            y: 36
            text_font: font_small
            text_color: 0x33B5FF
            text: "State: unavailable"

        - label:
            id: title_label
            x: 10
            y: 78
            width: 220
            text_font: font_large
            text: "No title"

        - label:
            id: artist_label
            x: 10
            y: 116
            width: 220
            text_font: font_medium
            text_color: 0x33FF66
            text: "No artist"

        - button:
            id: btn_prev
            x: 8
            y: 185
            width: 68
            height: 42
            radius: 6
            bg_color: 0x202020
            border_width: 2
            border_color: 0xFFFFFF
            on_click:
              then:
                - homeassistant.action:
                    action: media_player.volume_down
                    data:
                      entity_id: media_player.arc
            widgets:
              - label:
                  align: CENTER
                  text_font: font_small
                  text: "VOL-"

        - button:
            id: btn_pause
            x: 86
            y: 185
            width: 68
            height: 42
            radius: 6
            bg_color: 0x202020
            border_width: 2
            border_color: 0xFFFFFF
            on_click:
              then:
                - homeassistant.action:
                    action: media_player.media_pause
                    data:
                      entity_id: media_player.arc
            widgets:
              - label:
                  align: CENTER
                  text_font: font_small
                  text: "PAUSE"

        - button:
            id: btn_next
            x: 164
            y: 185
            width: 68
            height: 42
            radius: 6
            bg_color: 0x202020
            border_width: 2
            border_color: 0xFFFFFF
            on_click:
              then:
                - homeassistant.action:
                    action: media_player.volume_up
                    data:
                      entity_id: media_player.arc
            widgets:
              - label:
                  align: CENTER
                  text_font: font_small
                  text: "VOL+"
